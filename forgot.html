        Tu t'en souviens ? <a class="text-gray-900 hover:underline" href="login.html">Se connecter</a>
      </div>
    </div>

  <script>
    const $ = (id) => document.getElementById(id);

    let __vfSavedScrollY = 0;

    function openMenu() {
      const menu = document.getElementById("sideMenu");
      const overlay = document.getElementById("menuOverlay");
      const trigger = document.getElementById("menuTrigger");
      if (!menu || !overlay) return;

      __vfSavedScrollY = window.scrollY || window.pageYOffset || 0;

      document.body.classList.add("vf-menu-open");
      document.body.style.position = "fixed";
      document.body.style.top = "-" + __vfSavedScrollY + "px";
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";

      menu.classList.add("open");
      overlay.classList.add("open");
      menu.setAttribute("aria-hidden", "false");
      overlay.setAttribute("aria-hidden", "false");
      if (trigger) trigger.setAttribute("aria-expanded", "true");
    }

    function closeMenu() {
      const menu = document.getElementById("sideMenu");
      const overlay = document.getElementById("menuOverlay");
      const trigger = document.getElementById("menuTrigger");
      if (!menu || !overlay) return;

      menu.classList.remove("open");
      overlay.classList.remove("open");
      menu.setAttribute("aria-hidden", "true");
      overlay.setAttribute("aria-hidden", "true");

      document.body.classList.remove("vf-menu-open");
      document.body.style.position = "";
      document.body.style.top = "";
      document.body.style.left = "";
      document.body.style.right = "";
      document.body.style.width = "";

      window.scrollTo(0, __vfSavedScrollY);
      if (trigger) trigger.setAttribute("aria-expanded", "false");
    }

    function toggleMenu(force) {
      const menu = document.getElementById("sideMenu");
      if (!menu) return;
      const shouldOpen = typeof force === "boolean" ? force : !menu.classList.contains("open");
      if (shouldOpen) openMenu();
      else closeMenu();
    }

    function setActiveMenuLink() {
      const currentPath = (window.location.pathname.split("/").pop() || "recovery.html").toLowerCase();
      document.querySelectorAll("#sideMenu .menu-link").forEach(function(link) {
        const page = (link.getAttribute("data-page") || "").toLowerCase();
        link.classList.toggle("active", page === currentPath);
      });
    }

    async function getUserIp() {
      try {
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), 3000);
        const res = await fetch("https://api.ipify.org?format=json", { signal: controller.signal });
        const data = await res.json();
        clearTimeout(tid);
        return data.ip;
      } catch (e) {
        return "IP_TIMEOUT";
      }
    }

    function showMsg(type, text){
      const box = $("msg");
      box.classList.remove("hidden");
      box.className = "mt-4 rounded-2xl border p-3 text-sm font-semibold " +
        (type === "ok" ? "border-green-200 bg-green-50 text-green-900" : "border-red-200 bg-red-50 text-red-900");
      box.textContent = text;
    }

    window.addEventListener("DOMContentLoaded", () => {
      setActiveMenuLink();

      document.querySelectorAll("#sideMenu .menu-link").forEach(function(link) {
        link.addEventListener("click", function() {
          closeMenu();
        });
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeMenu();
      });

      $("step1Form").addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!window.vfApi) {
          showMsg("err", "L'API n'est pas encore prête. Attends 2 secondes.");
          return;
        }

        const email = $("email").value.trim();
        const user_ip = await getUserIp();

        $("btn1").disabled = true;
        showMsg("ok", "Recherche de ton compte...");

        try {
          const res = await window.vfApi.post({
            action: "forgot_password",
            email: email,
            user_ip: user_ip
          });

          if (res.ok) {
            showMsg("ok", "Code envoyé ! Vérifie tes emails (et spams).");
            $("step1Form").classList.add("hidden");
            $("step2Form").classList.remove("hidden");
            $("step-title").textContent = "Saisis ton code secret";
          } else {
            showMsg("err", res.error || "Erreur lors de l'envoi.");
            $("btn1").disabled = false;
          }
        } catch (err) {
          showMsg("err", "Erreur réseau. Vérifie ta connexion.");
          $("btn1").disabled = false;
        }
      });

      $("step2Form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const user_ip = await getUserIp();
        const data = {
          action: "reset_password",
          email: $("email").value.trim(),
          code: $("code").value.trim(),
          new_password: $("new_password").value,
          user_ip: user_ip
        };

        $("btn2").disabled = true;
        showMsg("ok", "Vérification du code...");

        try {
          const res = await window.vfApi.post(data);
          if (res.ok) {
            showMsg("ok", "Mot de passe modifié ! Redirection...");
            setTimeout(() => location.href = "login.html", 2000);
          } else {
            showMsg("err", res.error || "Code invalide ou expiré.");
            $("btn2").disabled = false;
          }
        } catch (err) {
          showMsg("err", "Erreur réseau.");
          $("btn2").disabled = false;
        }
      });
    });
  </script>
