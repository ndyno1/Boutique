<script>
  const CONFIG = window.VF_CONFIG || {};
  const GOOGLE_URL = String(CONFIG.orderScriptUrl || "").trim();       // paiement
  const WALLET_SCRIPT_URL = String(CONFIG.scriptUrl || "").trim();     // lecture solde
  const BOT_WEBHOOK_URL = String(CONFIG.avisScriptUrl || "").trim();

  const JSONP_TIMEOUT_MS = 12000;
  const IFRAME_TIMEOUT_MS = 30000;
  const WALLET_CACHE_TTL_MS = 60000;
  const WALLET_FRESH_PAY_TTL_MS = 15000;
  const JOURNAL_KEY_PREFIX = "vf_payment_journal_";
  const JOURNAL_LIMIT = 120;

  function getEl_(id){ return document.getElementById(id); }

  function ensureUiHelpers_(){
    const card = document.querySelector(".bg-white.rounded-\\[32px\\]") || document.querySelector(".bg-white");
    if (!card) return;

    if (!getEl_("noticeBox")) {
      const notice = document.createElement("div");
      notice.id = "noticeBox";
      notice.className = "hidden mb-4 rounded-2xl border px-4 py-3 text-sm font-bold";
      card.insertBefore(notice, card.firstChild);
    }

    if (!getEl_("debugBox")) {
      const dbg = document.createElement("pre");
      dbg.id = "debugBox";
      dbg.className = "hidden mt-3 rounded-2xl bg-gray-900 text-gray-100 p-4 text-xs overflow-auto whitespace-pre-wrap";
      const notice = getEl_("noticeBox");
      if (notice) notice.insertAdjacentElement("afterend", dbg);
    }

    if (!getEl_("journalWrap")) {
      const wrap = document.createElement("div");
      wrap.id = "journalWrap";
      wrap.className = "mt-4 rounded-2xl border border-gray-200 bg-gray-50 p-4";
      wrap.innerHTML = `
        <div class="flex items-center justify-between gap-3">
          <div>
            <div class="text-[10px] font-black uppercase tracking-widest text-gray-400">Journal de paiement</div>
            <div class="text-[12px] font-bold text-gray-700 mt-1">Trace locale du solde, du paiement et des erreurs.</div>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" id="copyJournalBtn" class="bg-white border border-gray-200 px-3 py-2 rounded-xl font-black text-[10px] uppercase hover:border-[#F07E13] hover:text-[#F07E13]">Copier</button>
            <button type="button" id="clearJournalBtn" class="bg-gray-900 text-white px-3 py-2 rounded-xl font-black text-[10px] uppercase">Vider</button>
          </div>
        </div>
        <div id="journalBox" class="mt-3 max-h-56 overflow-auto rounded-xl bg-white border border-gray-200 p-3 text-[11px] text-gray-700"></div>
      `;

      const debugBox = getEl_("debugBox");
      if (debugBox) debugBox.insertAdjacentElement("afterend", wrap);

      getEl_("copyJournalBtn").addEventListener("click", async function(){
        try{
          await navigator.clipboard.writeText(getJournalText_());
          showNotice_("Journal copié.", "success");
          setTimeout(hideNotice_, 1500);
        }catch(_){
          showNotice_("Impossible de copier le journal.", "warn");
        }
      });

      getEl_("clearJournalBtn").addEventListener("click", function(){
        clearJournal_();
        renderJournal_();
        showNotice_("Journal vidé.", "info");
        setTimeout(hideNotice_, 1200);
      });
    }
  }

  function showNotice_(message, type){
    const box = getEl_("noticeBox");
    if (!box) return;

    const map = {
      error: "bg-red-50 border-red-200 text-red-700",
      success: "bg-green-50 border-green-200 text-green-700",
      warn: "bg-orange-50 border-orange-200 text-orange-700",
      info: "bg-blue-50 border-blue-200 text-blue-700"
    };

    box.className = "mb-4 rounded-2xl border px-4 py-3 text-sm font-bold " + (map[type] || map.info);
    box.innerHTML = String(message || "");
  }

  function hideNotice_(){
    const box = getEl_("noticeBox");
    if (!box) return;
    box.className = "hidden mb-4 rounded-2xl border px-4 py-3 text-sm font-bold";
    box.innerHTML = "";
  }

  function showDebug_(label, data){
    const box = getEl_("debugBox");
    if (!box) return;
    let txt = "";
    try {
      txt = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    } catch (_) {
      txt = String(data);
    }
    box.textContent = label + "\n" + txt;
    box.classList.remove("hidden");
  }

  function hideDebug_(){
    const box = getEl_("debugBox");
    if (!box) return;
    box.textContent = "";
    box.classList.add("hidden");
  }

  function clearFieldErrors_(){
    document.querySelectorAll(".field-error").forEach(function(el){
      el.classList.remove("field-error");
      el.style.borderColor = "";
      el.style.boxShadow = "";
    });
  }

  function markFieldError_(id){
    const el = getEl_(id);
    if (!el) return;
    el.classList.add("field-error");
    el.style.borderColor = "#ef4444";
    el.style.boxShadow = "0 0 0 4px rgba(239,68,68,.08)";
    try { el.focus(); } catch (_) {}
  }

  function safeDecode(v){
    try { return decodeURIComponent(String(v || "")); }
    catch (_) { return String(v || ""); }
  }

  function safeHtml_(txt){
    return String(txt || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function copyText(txt){
    try{
      await navigator.clipboard.writeText(String(txt || ""));
      showNotice_("Numéro de commande copié.", "success");
      setTimeout(hideNotice_, 1800);
    }catch(_){
      showNotice_("Impossible de copier automatiquement.", "warn");
    }
  }

  function setActiveMenuLinkFallback_() {
    const currentPath = (window.location.pathname.split("/").pop() || "paiement.html").toLowerCase();
    document.querySelectorAll(".vf-menu-link").forEach(function(link) {
      const path = (link.getAttribute("data-path") || "").toLowerCase();
      const file = path.split("/").pop();
      link.classList.toggle("active", file === currentPath);
    });
  }

  function makeOrderId(){
    return "VF-" + Date.now() + "-" + Math.floor(1000 + Math.random() * 9000);
  }

  function startNewOrder_(goShop){
    try{
      const old = sessionStorage.getItem("active_order_id");
      if (old) {
        sessionStorage.removeItem("vf_order_sent_" + old);
        sessionStorage.removeItem("vf_order_inflight_" + old);
      }
      sessionStorage.removeItem("active_order_id");
    }catch(_){}
    if (goShop) location.href = "index.html";
    else location.reload();
  }

  function getSession_(){
    try{
      const raw = localStorage.getItem("vf_session");
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s) return null;
      return s;
    }catch(_){
      return null;
    }
  }

  function getSessionToken_(){
    const s = getSession_();
    if (!s) return "";
    return String(s.token || (s.user && s.user.token) || "").trim();
  }

  function getSessionEmail_(){
    const s = getSession_();
    if (!s) return "";
    return String(s.email || (s.user && s.user.email) || "").trim().toLowerCase();
  }

  function fmt2(n){
    const x = Number(n || 0);
    if (!isFinite(x)) return "0.00";
    return x.toFixed(2);
  }

  function getTotalNumber_(){
    const priceEl = getEl_("display-price");
    let txt = String(priceEl ? priceEl.textContent : "0");
    txt = txt.replace(/,/g, ".").replace(/[^0-9.]/g, "");
    return parseFloat(txt) || 0;
  }

  function normalizeBool_(value){
    if (value === true) return true;
    if (value === false) return false;
    if (typeof value === "string") {
      const v = value.trim().toLowerCase();
      return v === "true" || v === "1" || v === "ok" || v === "success";
    }
    if (typeof value === "number") return value === 1;
    return false;
  }

  function normalizeResponse_(raw){
    if (raw == null) {
      return { ok:false, message:"Réponse vide du serveur.", raw:raw };
    }

    if (typeof raw === "string") {
      try {
        return normalizeResponse_(JSON.parse(raw));
      } catch (_) {
        return {
          ok: /success|ok|valid/i.test(raw),
          alreadyPaid: /already|duplicate/i.test(raw),
          message: raw,
          raw: raw
        };
      }
    }

    const ok =
      normalizeBool_(raw.ok) ||
      normalizeBool_(raw.success) ||
      normalizeBool_(raw.paid) ||
      String(raw.status || "").trim().toLowerCase() === "success";

    const alreadyPaid =
      raw.alreadyPaid === true ||
      raw.duplicate === true ||
      String(raw.code || "").toUpperCase() === "ALREADY_PAID";

    const balance =
      raw.wallet && typeof raw.wallet.balance !== "undefined"
        ? raw.wallet.balance
        : (typeof raw.balance !== "undefined" ? raw.balance : undefined);

    return {
      ok: ok,
      alreadyPaid: alreadyPaid,
      balance: balance,
      orderId: raw.order || raw.orderId || raw.order_id || "",
      auto: raw.auto || null,
      message: String(raw.message || raw.error || raw.details || (ok ? "Paiement confirmé." : "Paiement refusé ou non confirmé.")),
      raw: raw
    };
  }

  function journalKey_(){ return JOURNAL_KEY_PREFIX + orderId; }

  function getJournal_(){
    try{
      const raw = sessionStorage.getItem(journalKey_());
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    }catch(_){ return []; }
  }

  function saveJournal_(arr){
    try{ sessionStorage.setItem(journalKey_(), JSON.stringify(arr.slice(-JOURNAL_LIMIT))); }catch(_){}
  }

  function logJournal_(level, message, extra){
    const arr = getJournal_();
    arr.push({
      at: new Date().toISOString(),
      level: String(level || "INFO").toUpperCase(),
      message: String(message || ""),
      extra: typeof extra === "undefined" ? null : extra
    });
    saveJournal_(arr);
    renderJournal_();
  }

  function clearJournal_(){
    try{ sessionStorage.removeItem(journalKey_()); }catch(_){}
  }

  function getJournalText_(){
    return getJournal_().map(function(item){
      let line = `[${item.at}] [${item.level}] ${item.message}`;
      if (item.extra !== null && typeof item.extra !== "undefined") {
        try { line += "\n" + JSON.stringify(item.extra, null, 2); }
        catch (_) { line += "\n" + String(item.extra); }
      }
      return line;
    }).join("\n\n");
  }

  function renderJournal_(){
    const box = getEl_("journalBox");
    if (!box) return;
    const arr = getJournal_();
    if (!arr.length) {
      box.innerHTML = '<div class="text-gray-400 font-bold">Aucun événement pour le moment.</div>';
      return;
    }

    box.innerHTML = arr.slice().reverse().map(function(item){
      let extraHtml = "";
      if (item.extra !== null && typeof item.extra !== "undefined") {
        let txt = "";
        try { txt = JSON.stringify(item.extra, null, 2); }
        catch (_) { txt = String(item.extra); }
        extraHtml = `<pre class="mt-1 text-[10px] text-gray-500 whitespace-pre-wrap overflow-auto">${safeHtml_(txt)}</pre>`;
      }

      const levelColor =
        item.level === "ERROR" ? "text-red-600" :
        item.level === "WARN" ? "text-orange-600" :
        item.level === "SUCCESS" ? "text-green-600" :
        "text-gray-700";

      return `
        <div class="journal-line border-b border-gray-100 pb-2">
          <div class="flex items-start justify-between gap-2">
            <div class="font-black ${levelColor}">${safeHtml_(item.level)}</div>
            <div class="text-[10px] text-gray-400 font-bold">${safeHtml_(item.at)}</div>
          </div>
          <div class="mt-1 text-[11px] font-medium text-gray-700">${safeHtml_(item.message)}</div>
          ${extraHtml}
        </div>
      `;
    }).join("");
  }

  function jsonp_(targetUrl, paramsObj, onOk, onErr, timeoutMs){
    if (!targetUrl) {
      onErr && onErr(new Error("URL manquante"));
      return;
    }

    const cb = "VF_CB_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
    const s = document.createElement("script");
    let done = false;

    const timer = setTimeout(function(){
      if (done) return;
      done = true;
      try { delete window[cb]; } catch (_) {}
      try { s.remove(); } catch (_) {}
      onErr && onErr(new Error("TIMEOUT"));
    }, timeoutMs || JSONP_TIMEOUT_MS);

    window[cb] = function(payload){
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch (_) {}
      try { s.remove(); } catch (_) {}
      onOk && onOk(payload);
    };

    const qs = new URLSearchParams();
    Object.keys(paramsObj || {}).forEach(function(k){
      qs.set(k, paramsObj[k] == null ? "" : String(paramsObj[k]));
    });
    qs.set("callback", cb);
    qs.set("t", String(Date.now()));

    s.src = targetUrl + (targetUrl.includes("?") ? "&" : "?") + qs.toString();
    s.async = true;
    s.onerror = function(){
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch (_) {}
      try { s.remove(); } catch (_) {}
      onErr && onErr(new Error("NETWORK_ERROR"));
    };

    document.body.appendChild(s);
  }

  function requestJsonp_(url, params, timeoutMs){
    return new Promise(function(resolve, reject){
      jsonp_(url, params, resolve, reject, timeoutMs || JSONP_TIMEOUT_MS);
    });
  }

  function postToAppsScriptIframe_(url, payload, timeoutMs){
    return new Promise(function(resolve, reject){
      if (!url) {
        reject(new Error("URL de paiement manquante."));
        return;
      }

      const frameName = "vfPayFrame_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
      const iframe = document.createElement("iframe");
      iframe.name = frameName;
      iframe.style.display = "none";

      const form = document.createElement("form");
      form.method = "POST";
      form.action = url;
      form.target = frameName;
      form.style.display = "none";

      const finalPayload = Object.assign({}, payload || {}, { transport: "iframe" });

      Object.keys(finalPayload).forEach(function(key){
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = finalPayload[key] == null ? "" : String(finalPayload[key]);
        form.appendChild(input);
      });

      let done = false;

      function cleanup_(){
        done = true;
        window.removeEventListener("message", onMessage_);
        clearTimeout(timer);
        try { form.remove(); } catch (_) {}
        try { iframe.remove(); } catch (_) {}
      }

      function onMessage_(ev){
        if (done) return;
        const data = ev.data;
        if (!data || typeof data !== "object") return;
        if (payload.request_id && data.request_id !== payload.request_id) return;
        cleanup_();
        resolve(data);
      }

      const timer = setTimeout(function(){
        if (done) return;
        cleanup_();
        reject(new Error("TIMEOUT_IFRAME"));
      }, timeoutMs || IFRAME_TIMEOUT_MS);

      window.addEventListener("message", onMessage_);
      document.body.appendChild(iframe);
      document.body.appendChild(form);
      form.submit();
    });
  }

  const params = new URLSearchParams(window.location.search);
  const idS = (params.get("id") || "").trim();

  (function ensureFreshOrderIdForService_(){
    try{
      const prevServiceId = sessionStorage.getItem("vf_service_id") || "";
      const active = sessionStorage.getItem("active_order_id") || "";
      if (idS && prevServiceId && idS !== prevServiceId) {
        if (active) {
          sessionStorage.removeItem("vf_order_sent_" + active);
          sessionStorage.removeItem("vf_order_inflight_" + active);
        }
        sessionStorage.removeItem("active_order_id");
      }
      if (idS) sessionStorage.setItem("vf_service_id", idS);
    }catch(_){}
  })();

  let orderId = sessionStorage.getItem("active_order_id");
  if (!orderId) {
    orderId = makeOrderId();
    sessionStorage.setItem("active_order_id", orderId);
  }
  getEl_("live-order-id").innerText = orderId;

  const SENT_KEY = "vf_order_sent_" + orderId;
  const INFLIGHT_KEY = "vf_order_inflight_" + orderId;
  let SUBMIT_LOCK = false;

  function showLocked_(oid){
    getEl_("lockedId").textContent = String(oid || "");
    getEl_("lockedOverlay").style.display = "flex";
    logJournal_("WARN", "Tentative bloquée : commande déjà validée.", { orderId: oid || orderId });
  }

  function hardLockForm_(){
    const wbtn = getEl_("walletPayBtn");
    if (wbtn) {
      wbtn.disabled = true;
      wbtn.style.opacity = ".6";
      wbtn.style.cursor = "not-allowed";
      wbtn.innerText = "Déjà payé";
    }
  }

  function fireSuccessConfetti_(){
    try{
      const defaults = { spread: 70, ticks: 220, gravity: 0.9, decay: 0.94, startVelocity: 32 };
      confetti({ ...defaults, particleCount: 110, origin: { x: 0.5, y: 0.55 } });
      setTimeout(function(){ confetti({ ...defaults, particleCount: 70, angle: 60, origin: { x: 0.05, y: 0.7 } }); }, 180);
      setTimeout(function(){ confetti({ ...defaults, particleCount: 70, angle: 120, origin: { x: 0.95, y: 0.7 } }); }, 320);
    } catch(_){}
  }

  function showSuccess_(oid){
    sessionStorage.setItem(SENT_KEY, "1");
    sessionStorage.removeItem(INFLIGHT_KEY);
    sessionStorage.removeItem("active_order_id");
    fireSuccessConfetti_();
    hideNotice_();
    hideDebug_();
    getEl_("form-container").classList.add("hidden");
    getEl_("final-id").innerText = oid || orderId;
    getEl_("success-msg").classList.remove("hidden");
    hardLockForm_();
    window.scrollTo({ top: 0, behavior: "smooth" });
    logJournal_("SUCCESS", "Paiement confirmé et écran de succès affiché.", { orderId: oid || orderId });
  }

  if (sessionStorage.getItem(SENT_KEY) === "1") {
    hardLockForm_();
    getEl_("form-container").classList.add("hidden");
    getEl_("final-id").innerText = orderId;
    getEl_("success-msg").classList.remove("hidden");
  }

  const nom = params.get("nom") || "Service";
  const rawPrix = params.get("prix");
  let cleanPrix = String(rawPrix || "0").replace(/,/g, ".");
  const prixInit = parseFloat(cleanPrix) || 0;

  const cat = params.get("cat") || "";
  const desc = safeDecode(params.get("desc") || "");
  const longDesc = safeDecode(params.get("long") || params.get("long_desc") || "");
  const minParam = parseFloat(params.get("min"));
  const maxParam = parseFloat(params.get("max"));

  getEl_("service-name").innerText = nom;
  getEl_("cat-badge").innerText = cat || "Service";

  const descSection = getEl_("description-section");
  const longBox = getEl_("long-box");
  const descBox = getEl_("desc-box");
  const longText = getEl_("long-text");
  const descText = getEl_("desc-text");

  let hasAnyDesc = false;
  if (longDesc && longDesc.trim() !== "") {
    longText.textContent = longDesc;
    longBox.classList.remove("hidden");
    hasAnyDesc = true;
  }
  if (desc && desc.trim() !== "") {
    descText.textContent = desc;
    descBox.classList.remove("hidden");
    hasAnyDesc = true;
  }
  if (hasAnyDesc) descSection.classList.remove("hidden");

  const catUpper = String(cat || "").trim().toUpperCase();
  const isSMM  = /(SMM|BOOST|BOOST2|PEAK|PEAKERR)/i.test(catUpper);
  const isAbo  = (catUpper === "ABONNEMENT" || /\bABONNEMENT\b/i.test(catUpper));
  const isCarte = (catUpper === "CARTE" || catUpper === "CARTE2" || catUpper === "JEUX" || /\bCARTE2?\b/i.test(catUpper));
  const isIMEI = /IMEI/i.test(catUpper);

  const secSmm = getEl_("section-smm");
  const secAbo = getEl_("section-abonnement");
  const secCarte = getEl_("section-carte");
  const secDef = getEl_("section-default");

  const priceEl = getEl_("display-price");
  const qtyInp = getEl_("qty");
  const qtyHint = getEl_("qty-hint");

  let WALLET_OK = false;
  let WALLET_BAL = 0;
  let WALLET_EMAIL = "";
  let WALLET_LOADING = false;
  let walletBalancePromise_ = null;
  let walletLastFetchAt_ = 0;

  function walletCacheKey_(){ return WALLET_EMAIL ? "vf_wallet_balance_cache_" + WALLET_EMAIL : ""; }

  function saveWalletCache_(balance){
    try{
      if (!WALLET_EMAIL) return;
      localStorage.setItem(walletCacheKey_(), JSON.stringify({
        ts: Date.now(),
        data: { balance: Number(balance || 0) }
      }));
    }catch(_){}
  }

  function loadWalletCache_(){
    try{
      if (!WALLET_EMAIL) return null;
      const raw = localStorage.getItem(walletCacheKey_());
      if (!raw) return null;
      const obj = JSON.parse(raw);
      const bal = (obj.data && typeof obj.data.balance !== "undefined") ? obj.data.balance : obj.balance;
      if (typeof bal === "undefined" || !obj.ts) return null;
      return { balance: bal, ts: obj.ts };
    }catch(_){
      return null;
    }
  }

  function isWalletCacheFresh_(maxAgeMs){
    const c = loadWalletCache_();
    if (!c) return false;
    return (Date.now() - Number(c.ts || 0)) <= maxAgeMs;
  }

  function showWalletLoadingUI_(keepButtonState){
    const box = getEl_("walletBox");
    if(!box) return;

    box.classList.remove("hidden");
    getEl_("walletBalance").textContent = WALLET_OK ? fmt2(WALLET_BAL) : "...";
    getEl_("walletEmail").textContent = WALLET_EMAIL || "—";

    const hint = getEl_("walletHint");
    hint.textContent = "Vérification du solde wallet...";
    hint.className = "text-[11px] font-black mt-2 text-gray-400";

    if (!keepButtonState) {
      const btn = getEl_("walletPayBtn");
      if (btn){
        btn.disabled = true;
        btn.style.opacity = ".6";
        btn.style.cursor = "not-allowed";
      }
    }
  }

  function updateWalletUI_(){
    const box = getEl_("walletBox");
    if(!box) return;

    box.classList.remove("hidden");
    getEl_("walletEmail").textContent = WALLET_EMAIL || "—";

    const hint = getEl_("walletHint");
    const btn = getEl_("walletPayBtn");
    const need = getTotalNumber_();

    if (WALLET_LOADING && !WALLET_OK) {
      showWalletLoadingUI_(false);
      return;
    }

    if (!WALLET_OK) {
      getEl_("walletBalance").textContent = "—";
      hint.textContent = "Impossible de charger le solde pour le moment.";
      hint.className = "text-[11px] font-black mt-2 text-red-400";
      btn.disabled = true;
      btn.style.opacity = ".6";
      btn.style.cursor = "not-allowed";
      return;
    }

    getEl_("walletBalance").textContent = fmt2(WALLET_BAL);

    if (sessionStorage.getItem(SENT_KEY) === "1") {
      btn.disabled = true;
      btn.style.opacity = ".6";
      btn.style.cursor = "not-allowed";
      hint.textContent = "Commande déjà payée.";
      hint.className = "text-[11px] font-black mt-2 text-green-400";
      return;
    }

    if (need <= 0) {
      hint.textContent = "Montant invalide (0$). Vérifiez le produit.";
      hint.className = "text-[11px] font-black mt-2 text-red-400";
      btn.disabled = true;
      btn.style.opacity = ".6";
      btn.style.cursor = "not-allowed";
    } else if (WALLET_BAL >= need) {
      hint.textContent = "Solde suffisant pour régler l'achat.";
      hint.className = "text-[11px] font-black mt-2 text-green-400";
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.style.cursor = "pointer";
    } else {
      hint.innerHTML = `Solde insuffisant. <a href="wallet.html" class="text-orange-400 underline">Ajoutez du crédit</a>.`;
      hint.className = "text-[11px] font-black mt-2 text-red-400";
      btn.disabled = true;
      btn.style.opacity = ".6";
      btn.style.cursor = "not-allowed";
    }
  }

  async function fetchWalletBalance_(){
    const token = getSessionToken_();
    const email = WALLET_EMAIL || getSessionEmail_();

    if (!WALLET_SCRIPT_URL) {
      logJournal_("ERROR", "WALLET_SCRIPT_URL manquant.");
      return { ok: false, traces: [{ error: "WALLET_SCRIPT_URL_MISSING" }] };
    }

    const req = {
      url: WALLET_SCRIPT_URL,
      params: { action: "wallet_balance", token: token, email: email, currency: "USD" }
    };

    try {
      logJournal_("INFO", "Lecture du solde wallet sur le script wallet dédié.", req);
      const raw = await requestJsonp_(req.url, req.params, JSONP_TIMEOUT_MS);
      const res = normalizeResponse_(raw);
      const bal =
        raw && typeof raw.balance !== "undefined" ? Number(raw.balance) :
        (typeof res.balance !== "undefined" ? Number(res.balance) : NaN);

      if ((res.ok || (raw && normalizeBool_(raw.ok))) && isFinite(bal)) {
        logJournal_("SUCCESS", "Solde wallet récupéré.", { balance: bal, source: req.url });
        return { ok: true, balance: bal, traces: [{ try: req, raw: raw }] };
      }

      logJournal_("ERROR", "Réponse wallet reçue mais balance invalide.", raw);
      return { ok: false, traces: [{ try: req, raw: raw }] };
    } catch (err) {
      logJournal_("ERROR", "Erreur de lecture du solde wallet.", {
        source: req.url,
        error: err && err.message ? err.message : String(err)
      });
      return { ok: false, traces: [{ try: req, error: err && err.message ? err.message : String(err) }] };
    }
  }

  function refreshWalletBalance_(opts){
    opts = opts || {};
    const force = !!opts.force;
    const silent = !!opts.silent;

    if(!WALLET_EMAIL) return Promise.resolve(false);
    const now = Date.now();

    if (!force && walletBalancePromise_) return walletBalancePromise_;

    const cached = loadWalletCache_();
    if (!force && cached && (now - Number(cached.ts || 0)) <= WALLET_CACHE_TTL_MS) {
      WALLET_OK = true;
      WALLET_BAL = Number(cached.balance || 0);
      walletLastFetchAt_ = Number(cached.ts || 0);
      updateWalletUI_();
      logJournal_("INFO", "Solde wallet lu depuis le cache local.", { balance: WALLET_BAL });
      return Promise.resolve(true);
    }

    WALLET_LOADING = true;
    if (!silent) showWalletLoadingUI_(WALLET_OK);

    walletBalancePromise_ = new Promise(async function(resolve){
      const result = await fetchWalletBalance_();

      WALLET_LOADING = false;
      walletBalancePromise_ = null;

      if (result.ok) {
        WALLET_OK = true;
        WALLET_BAL = Number(result.balance || 0);
        walletLastFetchAt_ = Date.now();
        saveWalletCache_(WALLET_BAL);
        updateWalletUI_();
        resolve(true);
        return;
      }

      if (cached) {
        WALLET_OK = true;
        WALLET_BAL = Number(cached.balance || 0);
        walletLastFetchAt_ = Number(cached.ts || 0);
        logJournal_("WARN", "Échec réseau, repli sur le cache wallet.", { balance: WALLET_BAL });
      } else {
        WALLET_OK = false;
      }

      updateWalletUI_();
      resolve(false);
    });

    return walletBalancePromise_;
  }

  async function ensureFreshWalletBeforePay_(){
    const now = Date.now();

    if (WALLET_OK && (now - walletLastFetchAt_) <= WALLET_FRESH_PAY_TTL_MS) return true;

    if (isWalletCacheFresh_(WALLET_FRESH_PAY_TTL_MS)) {
      const c = loadWalletCache_();
      WALLET_OK = true;
      WALLET_BAL = Number(c.balance || 0);
      walletLastFetchAt_ = Number(c.ts || 0);
      updateWalletUI_();
      logJournal_("INFO", "Solde wallet frais récupéré depuis le cache.", { balance: WALLET_BAL });
      return true;
    }

    return await refreshWalletBalance_({ force:true, silent:false });
  }

  function setPayButtonLoading_(loading){
    const btn = getEl_("walletPayBtn");
    if (!btn) return;

    if (loading) {
      btn.disabled = true;
      btn.style.opacity = "1";
      btn.style.cursor = "progress";
      btn.innerHTML = "Validation en cours...";
    } else {
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.style.cursor = "pointer";
      btn.innerText = "Payer avec Wallet";
    }
  }

  async function walletPayRequest_(payload){
    const requestId = "REQ_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const finalPayload = Object.assign({}, payload, {
      action: "wallet_pay",
      request_id: requestId,
      email_client_source: payload.email || ""
    });

    logJournal_("INFO", "Envoi du paiement wallet via iframe.", {
      request_id: requestId,
      orderId: finalPayload.orderId,
      idService: finalPayload.idService,
      total: finalPayload.total,
      qty: finalPayload.quantite
    });

    const raw = await postToAppsScriptIframe_(GOOGLE_URL, finalPayload, IFRAME_TIMEOUT_MS);
    const res = normalizeResponse_(raw);

    logJournal_(res.ok ? "SUCCESS" : "ERROR", "Réponse du paiement wallet reçue.", raw);
    return { raw: raw, res: res };
  }

  function initWallet_(){
    const s = getSession_();

    if(!s) {
      const box = getEl_("walletBox");
      box.classList.remove("hidden");
      box.innerHTML = `
        <div class="flex items-center justify-between gap-3">
          <div>
            <div class="text-[10px] font-black uppercase tracking-widest text-gray-400">Paiement Wallet</div>
            <div class="text-[12px] font-bold text-white mt-1">Vous devez vous connecter pour payer.</div>
          </div>
          <a href="wallet.html" class="bg-white text-black py-3 px-5 rounded-2xl font-black text-[11px] uppercase shadow-lg hover:scale-[1.02] transition-transform text-center whitespace-nowrap">Se connecter</a>
        </div>`;
      logJournal_("WARN", "Utilisateur non connecté : wallet indisponible.");
      return;
    }

    WALLET_EMAIL = getSessionEmail_();
    logJournal_("INFO", "Session wallet détectée.", { email: WALLET_EMAIL });

    const cached = loadWalletCache_();
    if (cached) {
      WALLET_OK = true;
      WALLET_BAL = Number(cached.balance || 0);
      walletLastFetchAt_ = Number(cached.ts || 0);
      updateWalletUI_();
      logJournal_("INFO", "Cache wallet initial chargé.", { balance: WALLET_BAL });
      refreshWalletBalance_({ force:false, silent:true });
    } else {
      WALLET_LOADING = true;
      showWalletLoadingUI_(false);
      refreshWalletBalance_({ force:true, silent:false });
    }

    getEl_("walletPayBtn").addEventListener("click", async function(){
      hideNotice_();
      hideDebug_();
      clearFieldErrors_();

      if (SUBMIT_LOCK || sessionStorage.getItem(INFLIGHT_KEY) === "1" || sessionStorage.getItem(SENT_KEY) === "1") {
        showLocked_(orderId);
        return;
      }

      const ok = await ensureFreshWalletBeforePay_();
      const need = getTotalNumber_();

      if(!ok && !WALLET_OK){
        showNotice_("Impossible de charger le solde wallet pour le moment.", "error");
        logJournal_("ERROR", "Paiement bloqué : solde wallet introuvable.");
        return;
      }

      if (need <= 0) {
        showNotice_("Montant de la commande invalide (0$). Vérifiez le produit.", "error");
        logJournal_("ERROR", "Paiement bloqué : montant invalide.", { total: need });
        return;
      }

      if(WALLET_BAL < need){
        showNotice_("Solde insuffisant. Ajoutez du crédit puis réessayez.", "warn");
        logJournal_("WARN", "Paiement bloqué : solde insuffisant.", { balance: WALLET_BAL, need: need });
        return;
      }

      logJournal_("INFO", "Pré-validation wallet OK, soumission du formulaire.");
      getEl_("orderForm").requestSubmit();
    });
  }

  if (isSMM) {
    secSmm.classList.remove("hidden");
    const hasMin = Number.isFinite(minParam);
    const hasMax = Number.isFinite(maxParam);

    if (hasMin) qtyInp.min = String(parseInt(minParam, 10));
    if (hasMax) qtyInp.max = String(parseInt(maxParam, 10));

    if (hasMin || hasMax) {
      qtyHint.classList.remove("hidden");
      qtyHint.textContent = `Quantité autorisée : ${hasMin ? parseInt(minParam,10) : 0} – ${hasMax ? parseInt(maxParam,10) : "∞"}`;
    }

    function clampQty(q){
      let x = parseInt(String(q || "0").replace(/[^\d]/g,""), 10);
      if (!Number.isFinite(x) || x <= 0) x = hasMin ? parseInt(minParam,10) : 1;
      if (hasMin && x < parseInt(minParam,10)) x = parseInt(minParam,10);
      if (hasMax && x > parseInt(maxParam,10)) x = parseInt(maxParam,10);
      return x;
    }

    function updatePrice(){
      const q = clampQty(qtyInp.value);
      if (String(qtyInp.value) !== String(q)) qtyInp.value = q;
      const total = ((prixInit / 1000) * q);
      priceEl.textContent = (Number.isFinite(total) ? total.toFixed(2) : "0.00") + " $";
      updateWalletUI_();
    }

    qtyInp.addEventListener("input", updatePrice);
    updatePrice();
  } else if (isAbo) {
    secAbo.classList.remove("hidden");
    priceEl.textContent = prixInit.toFixed(2) + " $";
  } else if (isCarte) {
    secCarte.classList.remove("hidden");
    priceEl.textContent = prixInit.toFixed(2) + " $";
  } else {
    secDef.classList.remove("hidden");
    priceEl.textContent = prixInit.toFixed(2) + " $";
    if (isIMEI) getEl_("default-label").innerText = "Numéro IMEI (15 chiffres)";
  }

  getEl_("orderForm").onsubmit = async function(e){
    e.preventDefault();
    hideNotice_();
    hideDebug_();
    clearFieldErrors_();

    if (!GOOGLE_URL) {
      showNotice_("Configuration manquante : orderScriptUrl est vide dans vf_config.js.", "error");
      logJournal_("ERROR", "Configuration invalide : orderScriptUrl manquant.");
      return;
    }

    if (!WALLET_SCRIPT_URL) {
      showNotice_("Configuration manquante : scriptUrl wallet est vide dans vf_config.js.", "error");
      logJournal_("ERROR", "Configuration invalide : wallet script manquant.");
      return;
    }

    if (sessionStorage.getItem(SENT_KEY) === "1") {
      showLocked_(orderId);
      return;
    }

    if (SUBMIT_LOCK || sessionStorage.getItem(INFLIGHT_KEY) === "1") return;

    SUBMIT_LOCK = true;
    sessionStorage.setItem(INFLIGHT_KEY, "1");
    setPayButtonLoading_(true);

    let input1 = "";
    let emailForSheet = "";
    let contactValue = "";
    let qtyVal = 1;
    const totalNumber = getTotalNumber_();

    const resetLockAndBtn = function(){
      SUBMIT_LOCK = false;
      sessionStorage.removeItem(INFLIGHT_KEY);
      setPayButtonLoading_(false);
      updateWalletUI_();
    };

    if (!navigator.onLine) {
      showNotice_("Aucune connexion Internet détectée. Reconnectez-vous puis réessayez.", "error");
      logJournal_("ERROR", "Paiement annulé : navigateur hors ligne.");
      resetLockAndBtn();
      return;
    }

    if (!idS) {
      showNotice_("ID du service manquant (paramètre id).", "error");
      logJournal_("ERROR", "Paiement annulé : idService absent.");
      resetLockAndBtn();
      return;
    }

    if (isSMM) {
      const link = getEl_("boost-link").value.trim();
      const hasMin = Number.isFinite(minParam);
      const hasMax = Number.isFinite(maxParam);
      const q = parseInt(String(qtyInp.value || "0").replace(/[^\d]/g,""), 10);

      if (!link) {
        showNotice_("Ajoutez le lien à booster.", "error");
        markFieldError_("boost-link");
        logJournal_("ERROR", "Validation refusée : lien SMM manquant.");
        resetLockAndBtn();
        return;
      }

      if (!/^https?:\/\//i.test(link)) {
        showNotice_("Le lien à booster doit commencer par http:// ou https://", "error");
        markFieldError_("boost-link");
        logJournal_("ERROR", "Validation refusée : lien SMM invalide.", { link: link });
        resetLockAndBtn();
        return;
      }

      if (!q || q <= 0) {
        showNotice_("Quantité invalide.", "error");
        markFieldError_("qty");
        logJournal_("ERROR", "Validation refusée : quantité SMM invalide.", { qty: q });
        resetLockAndBtn();
        return;
      }

      if ((hasMin && q < parseInt(minParam,10)) || (hasMax && q > parseInt(maxParam,10))) {
        showNotice_(`Quantité invalide. Min=${hasMin ? parseInt(minParam,10) : 0}${hasMax ? ` / Max=${parseInt(maxParam,10)}` : ""}.`, "error");
        markFieldError_("qty");
        logJournal_("ERROR", "Validation refusée : quantité hors bornes.", { qty: q, min: minParam, max: maxParam });
        resetLockAndBtn();
        return;
      }

      input1 = link;
      qtyVal = q;
      emailForSheet = WALLET_EMAIL;
      contactValue = WALLET_EMAIL;
    }
    else if (isAbo) {
      const creds = getEl_("creds").value.trim();
      const contact = getEl_("delivery-contact-abo").value.trim();

      if (!creds) {
        showNotice_("Ajoutez vos identifiants (mail + mot de passe).", "error");
        markFieldError_("creds");
        logJournal_("ERROR", "Validation refusée : identifiants abonnement manquants.");
        resetLockAndBtn();
        return;
      }

      if (!contact) {
        showNotice_("Ajoutez un contact de livraison.", "error");
        markFieldError_("delivery-contact-abo");
        logJournal_("ERROR", "Validation refusée : contact abonnement manquant.");
        resetLockAndBtn();
        return;
      }

      input1 = creds;
      contactValue = contact;
      emailForSheet = contact;
      qtyVal = 1;
    }
    else if (isCarte) {
      const contact = getEl_("card-delivery").value.trim();

      if (!contact) {
        showNotice_("Ajoutez un contact de livraison.", "error");
        markFieldError_("card-delivery");
        logJournal_("ERROR", "Validation refusée : contact carte manquant.");
        resetLockAndBtn();
        return;
      }

      input1 = "CONTACT: voir colonne Email Client";
      contactValue = contact;
      emailForSheet = contact;
      qtyVal = 1;
    }
    else {
      const main = getEl_("main-input").value.trim();
      const em = getEl_("email-client").value.trim();

      if (!main) {
        showNotice_("Remplissez l'information requise.", "error");
        markFieldError_("main-input");
        logJournal_("ERROR", "Validation refusée : champ principal vide.");
        resetLockAndBtn();
        return;
      }

      if (isIMEI && !/^\d{15}$/.test(main)) {
        showNotice_("Le numéro IMEI doit contenir exactement 15 chiffres.", "error");
        markFieldError_("main-input");
        logJournal_("ERROR", "Validation refusée : IMEI invalide.", { value: main });
        resetLockAndBtn();
        return;
      }

      if (em && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) {
        showNotice_("L’adresse email saisie est invalide.", "error");
        markFieldError_("email-client");
        logJournal_("ERROR", "Validation refusée : email client invalide.", { email: em });
        resetLockAndBtn();
        return;
      }

      input1 = main;
      qtyVal = 1;
      if (em) {
        contactValue = em;
        emailForSheet = em;
      }
    }

    if (!input1) {
      showNotice_("Information manquante.", "error");
      logJournal_("ERROR", "Validation refusée : input1 vide.");
      resetLockAndBtn();
      return;
    }

    if (!emailForSheet && WALLET_EMAIL) {
      emailForSheet = WALLET_EMAIL;
      if (!contactValue) contactValue = WALLET_EMAIL;
    }

    const payload = {
      token: getSessionToken_(),
      walletEmail: WALLET_EMAIL,
      email: emailForSheet,
      orderId: orderId,
      idService: idS,
      productId: idS,
      produit: nom,
      categorie: cat,
      input1: input1,
      contact: contactValue,
      quantite: qtyVal,
      qty: qtyVal,
      total: totalNumber,
      currency: "USD",
      payMethod: "WALLET",
      fileData: "",
      fileType: "",
      fileName: "",
      idempotencyKey: "IDEMP_" + orderId
    };

    try {
      logJournal_("INFO", "Début du paiement wallet.", {
        orderId: orderId,
        service: idS,
        total: totalNumber,
        qty: qtyVal,
        walletEmail: WALLET_EMAIL
      });

      const out = await walletPayRequest_(payload);
      const res = out.res;

      console.log("wallet_pay raw:", out.raw);
      console.log("wallet_pay normalized:", res);

      if (res.alreadyPaid) {
        sessionStorage.setItem(SENT_KEY, "1");
        hardLockForm_();
        showLocked_(orderId);
        return;
      }

      if (!res.ok) {
        showNotice_(safeHtml_(res.message || "Paiement refusé ou non confirmé."), "error");
        showDebug_("Réponse brute du serveur :", out.raw);
        logJournal_("ERROR", "Le serveur a refusé ou non confirmé le paiement.", out.raw);
        resetLockAndBtn();
        return;
      }

      if (typeof res.balance !== "undefined") {
        WALLET_BAL = Number(res.balance || 0);
      } else {
        WALLET_BAL = Math.max(0, Number(WALLET_BAL || 0) - Number(totalNumber || 0));
      }
      WALLET_OK = true;
      walletLastFetchAt_ = Date.now();
      saveWalletCache_(WALLET_BAL);
      updateWalletUI_();
      logJournal_("SUCCESS", "Balance wallet mise à jour après paiement.", { balance: WALLET_BAL });

      try {
        if (BOT_WEBHOOK_URL) {
          const pseudoNom = WALLET_EMAIL ? WALLET_EMAIL.split("@")[0] : "Client Web";
          const qs = new URLSearchParams({
            source: "website",
            action: "nouvelle_commande",
            nom: pseudoNom,
            contact: contactValue || "N/A",
            service: nom || "Service inconnu",
            quantite: qtyVal || 1,
            montant: totalNumber + " $",
            t: Date.now()
          }).toString();

          const pingBot = new Image();
          pingBot.src = BOT_WEBHOOK_URL + (BOT_WEBHOOK_URL.includes("?") ? "&" : "?") + qs;
          logJournal_("INFO", "Webhook bot préparé.", { service: nom, amount: totalNumber, qty: qtyVal });
        }
      } catch (botErr) {
        console.log("Erreur préparation Bot:", botErr);
        logJournal_("WARN", "Erreur de préparation du webhook bot.", { error: String(botErr) });
      }

      showSuccess_(res.orderId || orderId);
    } catch (err) {
      console.error("Erreur paiement wallet :", err);
      showNotice_(safeHtml_(err && err.message ? err.message : "Erreur de connexion. Réessayez."), "error");
      showDebug_("Erreur JS attrapée :", {
        message: err && err.message ? err.message : String(err),
        stack: err && err.stack ? err.stack : ""
      });
      logJournal_("ERROR", "Exception JavaScript pendant le paiement.", {
        message: err && err.message ? err.message : String(err),
        stack: err && err.stack ? err.stack : ""
      });
      resetLockAndBtn();
    } finally {
      if (sessionStorage.getItem(SENT_KEY) === "1") {
        hardLockForm_();
        SUBMIT_LOCK = true;
      } else {
        SUBMIT_LOCK = false;
      }
    }
  };

  (function autoFillFromId(){
    const p = new URLSearchParams(location.search);
    const id = (p.get("id") || "").trim();
    const hasBasics = (p.get("nom") && p.get("prix") && p.get("cat"));
    if (!id || hasBasics || !GOOGLE_URL) return;

    const cb = "VF_PROD_" + Date.now();
    window[cb] = function(res){
      try{
        const arr = Array.isArray(res) ? res : (res && Array.isArray(res.products) ? res.products : []);
        const prod = arr.find(function(x){ return String(x.id || "").trim() === id; });
        if (!prod) return;
        const qp = new URLSearchParams();
        qp.set("id", prod.id || id);
        qp.set("nom", prod.nom || "");
        qp.set("prix", prod.prix || "");
        qp.set("cat", prod.cat || "");
        qp.set("img", prod.img || "");
        qp.set("min", prod.min ?? "");
        qp.set("max", prod.max ?? "");
        qp.set("desc", prod.desc || "");
        qp.set("long", prod.long_desc || "");
        location.replace("paiement.html?" + qp.toString());
      } catch(e){}
    };

    const s = document.createElement("script");
    s.src = `${GOOGLE_URL}${GOOGLE_URL.includes("?") ? "&" : "?"}action=get_products&callback=${cb}&t=${Date.now()}`;
    document.body.appendChild(s);
  })();

  window.addEventListener("online", function(){
    hideNotice_();
    logJournal_("INFO", "Connexion internet rétablie.");
    if (WALLET_EMAIL) refreshWalletBalance_({ force:true, silent:false });
  });

  window.addEventListener("offline", function(){
    showNotice_("Connexion Internet perdue. Le paiement est temporairement indisponible.", "warn");
    logJournal_("WARN", "Connexion internet perdue.");
  });

  ensureUiHelpers_();
  renderJournal_();
  initWallet_();
  updateWalletUI_();
  setActiveMenuLinkFallback_();
  logJournal_("INFO", "Page paiement initialisée.", { orderId: orderId, serviceId: idS, produit: nom });
</script>
