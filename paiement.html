<!DOCTYPE html>
<html lang="fr" class="font-inter">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>ViralFlowr | Paiement Sécurisé</title>

  <script src="/styles/vf_config.js?v=2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body{ background:#F3F3F3; color:#201B16; font-family:'Inter', sans-serif; }
    .text-orange-bsv { color:#F07E13; }
    .checkout-container { max-width:500px; margin:2rem auto; padding:0 1rem; }
    .btn-pay { width:100%; background:#000; color:#fff; padding:1rem; border-radius:18px; font-weight:900; text-transform:uppercase; transition:0.2s; }
    .btn-pay:disabled { opacity:0.5; cursor:not-allowed; }
    .input-field { width:100%; border:1px solid #E5E7EB; border-radius:12px; padding:0.75rem; margin-top:0.5rem; outline:none; }
    .input-field:focus { border-color:#F07E13; }
    .notice { display:none; padding:1rem; border-radius:12px; margin-bottom:1rem; font-size:13px; font-weight:700; }
    .notice.error { background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; }
    .notice.show { display:block; }
  </style>
</head>

<body>
  <main class="checkout-container">
    <div class="flex justify-between items-center mb-8">
      <a href="index.html" class="text-2xl font-black italic">Viral<span class="text-orange-bsv">Flowr</span></a>
      <div id="walletDisplay" class="bg-black text-white px-4 py-2 rounded-full text-xs font-bold hidden">
        Solde: <span id="balanceVal">...</span> $
      </div>
    </div>

    <div id="noticeBox" class="notice"></div>

    <div id="form-container" class="bg-white rounded-[32px] p-6 shadow-xl border border-gray-100">
      <h1 id="serviceName" class="text-xl font-black text-center mb-1">Chargement...</h1>
      <p id="catBadge" class="text-[10px] text-gray-400 font-bold uppercase text-center mb-6">—</p>

      <div class="bg-gray-50 rounded-2xl p-4 text-center mb-6 border-2 border-dashed border-gray-200">
        <span class="text-[9px] font-black text-gray-400 uppercase">Commande ID</span>
        <div id="orderIdDisp" class="text-lg font-black">...</div>
      </div>

      <form id="payForm" class="space-y-4">
        <div id="sec-smm" class="hidden">
          <label class="text-[11px] font-black uppercase">Lien (URL)</label>
          <input type="text" id="input-link" class="input-field" placeholder="https://instagram.com/...">
          <label class="text-[11px] font-black uppercase mt-4 block">Quantité</label>
          <input type="number" id="input-qty" class="input-field" value="1000">
        </div>

        <div id="sec-abo" class="hidden">
          <label class="text-[11px] font-black uppercase">Identifiants (Mail:Pass)</label>
          <textarea id="input-creds" class="input-field h-24" placeholder="Compte : ...&#10;Passe : ..."></textarea>
        </div>

        <div id="sec-def" class="hidden">
          <label id="def-label" class="text-[11px] font-black uppercase">Information requise</label>
          <input type="text" id="input-def" class="input-field">
        </div>

        <div class="py-4 border-t border-b border-gray-50 my-6 text-center">
          <span class="text-[10px] text-gray-400 font-black uppercase">Total à payer</span>
          <div id="totalPrice" class="text-4xl font-black text-gray-900">0.00 $</div>
        </div>

        <button type="button" id="btnSubmit" class="btn-pay">Chargement du Wallet...</button>
      </form>
    </div>

    <div id="success-screen" class="hidden bg-white rounded-[32px] p-8 text-center shadow-xl border border-gray-100">
      <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h2 class="text-2xl font-black mb-2">Paiement Réussi</h2>
      <p class="text-gray-500 text-sm mb-8">Votre commande est en cours de traitement.</p>
      <button onclick="location.href='index.html'" class="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase text-xs">Retour Boutique</button>
    </div>
  </main>

  <script>
    const CONFIG = window.VF_CONFIG || {};
    const params = new URLSearchParams(location.search);
    const orderId = "VF-" + Date.now();
    
    // Éléments UI
    const btn = document.getElementById("btnSubmit");
    const totalDisp = document.getElementById("totalPrice");
    const balanceVal = document.getElementById("balanceVal");

    // Données du service
    const serviceId = params.get("id");
    const serviceNom = params.get("nom") || "Service";
    const servicePrix = parseFloat(params.get("prix") || "0");
    const serviceCat = (params.get("cat") || "").toUpperCase();

    let userBalance = 0;
    let userEmail = "";

    // 1. Initialisation de la page
    document.getElementById("serviceName").innerText = serviceNom;
    document.getElementById("catBadge").innerText = serviceCat;
    document.getElementById("orderIdDisp").innerText = orderId;

    if(/SMM|BOOST/.test(serviceCat)) document.getElementById("sec-smm").classList.remove("hidden");
    else if(/ABO/.test(serviceCat)) document.getElementById("sec-abo").classList.remove("hidden");
    else document.getElementById("sec-def").classList.remove("hidden");

    function calculateTotal() {
      const qty = document.getElementById("input-qty")?.value || 1000;
      const isSmm = /SMM|BOOST/.test(serviceCat);
      const final = isSmm ? (servicePrix / 1000) * qty : servicePrix;
      totalDisp.innerText = final.toFixed(2) + " $";
      return final;
    }

    document.getElementById("input-qty")?.addEventListener("input", calculateTotal);
    const totalFinal = calculateTotal();

    // 2. Récupération du solde (JSONP vers scriptUrl)
    function fetchBalance() {
      const session = JSON.parse(localStorage.getItem("vf_session") || "{}");
      if(!session.email) {
        btn.innerText = "Connectez-vous pour payer";
        btn.onclick = () => location.href = "wallet.html";
        return;
      }
      userEmail = session.email;
      const cb = "CB_BAL_" + Date.now();
      window[cb] = (res) => {
        if(res.ok) {
          userBalance = res.balance;
          balanceVal.innerText = userBalance.toFixed(2);
          document.getElementById("walletDisplay").classList.remove("hidden");
          btn.innerText = userBalance >= calculateTotal() ? "Confirmer le paiement" : "Solde insuffisant";
          btn.disabled = userBalance < calculateTotal();
        }
      };
      const s = document.createElement("script");
      s.src = `${CONFIG.scriptUrl}?action=wallet_balance&email=${userEmail}&callback=${cb}`;
      document.body.appendChild(s);
    }

    // 3. Exécution du paiement + ALERTE BOT (avisScriptUrl)
    btn.onclick = () => {
      btn.disabled = true;
      btn.innerText = "Traitement...";

      const inputData = document.getElementById("input-link")?.value || 
                        document.getElementById("input-creds")?.value || 
                        document.getElementById("input-def")?.value || "N/A";

      const payload = {
        action: "wallet_pay",
        orderId: orderId,
        email: userEmail,
        total: calculateTotal(),
        produit: serviceNom,
        idService: serviceId,
        input1: inputData
      };

      const cb = "CB_PAY_" + Date.now();
      window[cb] = (res) => {
        if(res.ok) {
          // --- ALERTE BOT WBA (La vraie partie "Avis") ---
          const botData = {
            source: "website",
            action: "nouvelle_commande",
            nom: userEmail.split('@')[0],
            contact: userEmail,
            service: serviceNom,
            montant: calculateTotal() + " $"
          };
          const img = new Image();
          img.src = `${CONFIG.avisScriptUrl}?${new URLSearchParams(botData).toString()}`;

          // UI Succès
          confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
          document.getElementById("form-container").classList.add("hidden");
          document.getElementById("success-screen").classList.remove("hidden");
        } else {
          document.getElementById("noticeBox").innerText = res.message || "Erreur de paiement";
          document.getElementById("noticeBox").classList.add("show", "error");
          btn.disabled = false;
          btn.innerText = "Réessayer";
        }
      };

      const s = document.createElement("script");
      s.src = `${CONFIG.scriptUrl}?${new URLSearchParams(payload).toString()}&callback=${cb}`;
      document.body.appendChild(s);
    };

    fetchBalance();
    calculateTotal();
  </script>
</body>
</html>
