<!DOCTYPE html>
<html lang="fr" class="font-inter">
<head>
  <script>
    (function () {
      const ref = document.referrer || "";
      const inAppsScriptPanel = /script\.googleusercontent\.com|script\.google\.com/i.test(ref);
      window.__VF_IN_APPS_SCRIPT_PANEL = inAppsScriptPanel;
      if (inAppsScriptPanel) return;

      const host = (location.hostname || "").toLowerCase();
      const isWWW = host === "www.viralflowr.com";
      const isApex = host === "viralflowr.com";
      const isTarget = isWWW || isApex;
      if (!isTarget) return;

      const CANON_HOST = "viralflowr.com";
      if (host === CANON_HOST) return;

      const GUARD_KEY = "vf_canon_redirect_guard";
      const now = Date.now();

      try {
        const guard = JSON.parse(sessionStorage.getItem(GUARD_KEY) || "null");
        if (guard && (now - guard.ts) < 15000) return;
        sessionStorage.setItem(GUARD_KEY, JSON.stringify({ ts: now, from: host, to: CANON_HOST }));
      } catch (_) {}

      location.replace("https://" + CANON_HOST + location.pathname + location.search + location.hash);
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ViralFlowr | Portfolio & Avis Clients</title>

  <meta name="theme-color" content="#111827" />
  <link rel="icon" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <meta property="og:title" content="ViralFlowr | Portfolio & Avis" />
  <meta property="og:description" content="Découvrez les retours certifiés de nos clients sur nos services." />
  <meta property="og:type" content="website" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="/styles/vf_menu.js?v=2" defer></script>
  <script src="/styles/vf_footer.js?v=2" defer></script>
  <link rel="stylesheet" href="/styles/vf_theme.css?v=2">

  <style>
    .avis-image-container {
      width: 100%;
      height: 160px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
      background: #f3f4f6;
    }

    .avis-image-container iframe,
    .avis-image-container img {
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .hover-card:hover .avis-image-container iframe,
    .hover-card:hover .avis-image-container img {
      transform: scale(1.05);
    }

    @media (max-width: 767px) {
      .avis-image-container {
        height: 150px;
        border-radius: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-gray-900 text-white py-2 text-[10px] font-bold uppercase tracking-[0.2em] text-center">
    MARKETPLACE PROFESSIONNELLE • LIVRAISON INTERNATIONALE • PAIEMENT SÉCURISÉ
  </div>

  <main class="max-w-[1280px] mx-auto px-4 py-8">
    <section class="mb-10">
      <article class="relative w-full h-[220px] sm:h-[240px] md:h-[300px] rounded-[24px] md:rounded-[32px] overflow-hidden shadow-2xl group border-4 border-white brand-gradient flex items-center justify-center text-center">
        <div class="relative z-10 p-5 sm:p-8 text-white">
          <h1 class="text-2xl sm:text-3xl md:text-5xl font-black mb-2 tracking-tighter uppercase italic">
            La Parole <br>Aux Clients.
          </h1>
          <p class="text-[11px] sm:text-xs md:text-lg font-medium opacity-90">
            Découvrez les retours certifiés sur nos services avec preuves à l'appui.
          </p>
        </div>
      </article>
    </section>

    <div id="loadError" class="hidden mb-6 bg-red-50 border border-red-200 text-red-700 font-bold text-xs rounded-2xl px-4 py-3"></div>

    <div id="avis-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-24">
      <div class="bg-white rounded-[30px] p-8 border border-gray-100 shadow-sm">
        <div class="h-40 skeleton-box rounded-2xl mb-4 w-full"></div>
        <div class="h-6 skeleton-box rounded mb-4 w-1/3"></div>
        <div class="h-4 skeleton-box rounded mb-2 w-full"></div>
        <div class="h-4 skeleton-box rounded mb-4 w-3/4"></div>
      </div>
      <div class="bg-white rounded-[30px] p-8 border border-gray-100 shadow-sm">
        <div class="h-40 skeleton-box rounded-2xl mb-4 w-full"></div>
        <div class="h-6 skeleton-box rounded mb-4 w-1/3"></div>
        <div class="h-4 skeleton-box rounded mb-2 w-full"></div>
        <div class="h-4 skeleton-box rounded mb-4 w-3/4"></div>
      </div>
      <div class="bg-white rounded-[30px] p-8 border border-gray-100 shadow-sm">
        <div class="h-40 skeleton-box rounded-2xl mb-4 w-full"></div>
        <div class="h-6 skeleton-box rounded mb-4 w-1/3"></div>
        <div class="h-4 skeleton-box rounded mb-2 w-full"></div>
        <div class="h-4 skeleton-box rounded mb-4 w-3/4"></div>
      </div>
    </div>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylffBPr9m8Y26asnlPuVDizwS5xOUe9zpUIt3NrbUZlVsMgNkh9bOcANYbkvTZbpL9/exec";

    function setActiveMenuLinkFallback_() {
      const currentPath = (window.location.pathname.split("/").pop() || "").toLowerCase();
      document.querySelectorAll(".vf-menu-link").forEach(function(link) {
        const path = (link.getAttribute("data-path") || "").toLowerCase();
        const file = path.split("/").pop();
        link.classList.toggle("active", file === currentPath);
      });
    }

    async function loadAvis() {
      try {
        const response = await fetch(APPS_SCRIPT_URL + "?action=getAvis", {
          method: "GET",
          redirect: "follow"
        });

        const data = await response.json();
        const grid = document.getElementById("avis-grid");

        if (!grid) return;

        if (!Array.isArray(data) || data.length === 0) {
          grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-300 font-bold uppercase tracking-widest">Aucun avis pour le moment</div>';
          return;
        }

        grid.innerHTML = data.reverse().map(avis => {
          const hasImage = avis.image && avis.image.includes("drive.google.com");
          let imageHtml = "";

          if (hasImage) {
            const previewUrl = avis.image.replace("view?usp=drivesdk", "preview");
            imageHtml = `
              <div class="avis-image-container">
                <iframe src="${previewUrl}" class="w-full h-full border-0 pointer-events-none" scrolling="no" loading="lazy"></iframe>
              </div>
            `;
          }

          return `
            <div class="hover-card group bg-white rounded-[30px] p-8 border border-gray-50 flex flex-col shadow-sm relative overflow-hidden">
              <div class="absolute top-0 left-0 w-2 h-full brand-gradient opacity-0 group-hover:opacity-100 transition-opacity"></div>

              <div class="flex items-center justify-between gap-3 mb-4">
                <div class="text-[14px] font-black text-[#F07E13] tracking-widest">
                  ${avis.note || ""}
                </div>
                ${hasImage ? `<span class="bg-gray-100 text-gray-500 text-[9px] font-bold px-2 py-1 rounded-md uppercase tracking-wider shrink-0">Avec Preuve</span>` : ""}
              </div>

              ${imageHtml}

              <h3 class="text-[15px] font-bold text-gray-800 leading-relaxed mb-6 italic flex-1">
                " ${avis.commentaire || ""} "
              </h3>

              <div class="flex items-center justify-between border-t border-gray-100 pt-4 mt-auto gap-3">
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-1">
                  Client Vérifié
                </span>
                <div class="bg-green-50 text-green-500 p-1.5 rounded-lg group-hover:brand-gradient group-hover:text-white transition-all shrink-0">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20 6L9 17l-5-5"></path>
                  </svg>
                </div>
              </div>
            </div>
          `;
        }).join("");

      } catch (error) {
        console.error("Erreur API :", error);

        const loadError = document.getElementById("loadError");
        const grid = document.getElementById("avis-grid");

        if (loadError) {
          loadError.classList.remove("hidden");
          loadError.textContent = "Connexion au serveur ViralFlowr impossible. Veuillez rafraîchir la page.";
        }

        if (grid) {
          grid.innerHTML = "";
        }
      }
    }

    function startAvisPage_() {
      setActiveMenuLinkFallback_();
      loadAvis();
    }

    window.addEventListener("load", startAvisPage_);
  </script>
</body>
</html>
