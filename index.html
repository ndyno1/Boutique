  <script>
    (function () {
      const ref = document.referrer || "";
      const inAppsScriptPanel = /script\.googleusercontent\.com|script\.google\.com/i.test(ref);
      window.__VF_IN_APPS_SCRIPT_PANEL = inAppsScriptPanel;
      if (inAppsScriptPanel) return;

      const host = (location.hostname || "").toLowerCase();
      const isWWW = host === "www.viralflowr.com";
      const isApex = host === "viralflowr.com";
      const isTarget = isWWW || isApex;
      if (!isTarget) return;

      const CANON_HOST = "viralflowr.com";
      if (host === CANON_HOST) return;

      const GUARD_KEY = "vf_canon_redirect_guard";
      const now = Date.now();

      try {
        const guard = JSON.parse(sessionStorage.getItem(GUARD_KEY) || "null");
        if (guard && (now - guard.ts) < 15000) return;
        sessionStorage.setItem(GUARD_KEY, JSON.stringify({ ts: now, from: host, to: CANON_HOST }));
      } catch (_) {}

      location.replace("https://" + CANON_HOST + location.pathname + location.search + location.hash);
    })();
  </script>

    (function checkGhostLogin() {
      const params = new URLSearchParams(window.location.search);
      const ghostEmail = params.get('ghost_email');

      if (ghostEmail) {
        localStorage.setItem("vf_session", JSON.stringify({ email: ghostEmail.toLowerCase() }));
        alert("👻 GHOST LOGIN ACTIF : Vous êtes maintenant connecté en tant que " + ghostEmail);
        window.history.replaceState({}, document.title, window.location.pathname);
        window.location.reload();
      }
    })();
  </script>

      <div class="bg-white rounded-[30px] p-4 flex flex-col shadow-sm"><div class="aspect-square skeleton-box rounded-[22px] mb-4"></div><div class="h-4 skeleton-box rounded mb-2 w-3/4"></div><div class="h-3 skeleton-box rounded w-1/2"></div></div>
      <div class="bg-white rounded-[30px] p-4 flex flex-col shadow-sm"><div class="aspect-square skeleton-box rounded-[22px] mb-4"></div><div class="h-4 skeleton-box rounded mb-2 w-3/4"></div><div class="h-3 skeleton-box rounded w-1/2"></div></div>
      <div class="bg-white rounded-[30px] p-4 flex flex-col shadow-sm"><div class="aspect-square skeleton-box rounded-[22px] mb-4"></div><div class="h-4 skeleton-box rounded mb-2 w-3/4"></div><div class="h-3 skeleton-box rounded w-1/2"></div></div>

  <script>
    const FALLBACK_IMG = "https://cdn-icons-png.flaticon.com/512/11520/11520110.png";
    let ALL_PRODUCTS = [];
    let CURRENT_FILTER = "all";
    let _isFirstLoad = true;

    const FILTER_MAP = {
      "Abonnement": ["ABONNEMENT"],
      "Carte2": ["CARTE2"],
      "Boost": ["BOOST", "BOOST2", "SMM1", "SMM2", "SMM3", "PEAKERR", "PEAK"],
      "Materiel": ["MATERIEL", "GADGET", "PHONE"],
      "IMEI": ["IMEI"],
      "Jeux": ["JEUX", "JEU", "GAME", "GAMING", "PSN", "PLAYSTATION", "XBOX", "STEAM", "NINTENDO"]
    };

    function safe(v) { return (v === null || v === undefined) ? "" : String(v); }
    function up(v) { return safe(v).trim().toUpperCase(); }

    function escHtml(str) {
      return safe(str).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function escAttr(str) { return safe(str).replace(/["']/g, ""); }
    function pName(p) { return safe(p.nom || p.name || p.title); }
    function pCat(p) { return safe(p.cat || p.category || p.categorie); }
    function pPrice(p) { return safe(p.prix_affiche ?? p.prix_revendeur ?? p.prix ?? p.price ?? p.amount); }
    function pImg(p) { return safe(p.img || p.image || p.photo || p.image_url || p.cover || p.thumbnail); }
    function pStableId(p) { return safe(p.__vf_id || p.id || p.ID).trim(); }

    function getStore() { return window.vfApi?.storage || window.vfStorage || null; }

    function getSession_() {
      const st = getStore();
      try { if (st?.getSession) return st.getSession(); } catch (_) {}
      try { return JSON.parse(localStorage.getItem("vf_session")); } catch (_) { return null; }
    }

    function getToken_() {
      const st = getStore();
      try { if (st?.getToken) return String(st.getToken()).trim(); } catch (_) {}
      return localStorage.getItem("vf_token")?.trim() || "";
    }

    function bindSearchInput_() {
      const input = document.getElementById("searchInput");
      if (!input || input.dataset.vfBound === "1") return;
      input.dataset.vfBound = "1";
      input.addEventListener("input", function () { render(); });
    }

    async function loadProducts_(token) {
      try {
        const api = window.vfApi;
        let payload;

        console.log("VF loadProducts_ token =", token);
        console.log("VF vfApi =", api);
        console.log("VF vfJsonp =", window.vfJsonp);
        console.log("VF scriptUrl =", window.VF_CONFIG?.scriptUrl || "");

        if (api && typeof api.getProducts === "function") {
          payload = await api.getProducts({ cat: "all", token: token || "" });
        } else if (window.vfJsonp) {
          payload = await window.vfJsonp("get_products", { cat: "all", token: token || "" });
        } else {
          // VIRAL : api_services = JSON ; get_products = JSONP
          const scriptUrl = window.VF_CONFIG?.scriptUrl || "";
          if (!scriptUrl) throw new Error("URL de script manquante");

          const resp = await fetch(`${scriptUrl}?action=api_services&token=${encodeURIComponent(token || "")}`);
          const json = await resp.json();

          payload = {
            products: Array.isArray(json?.services) ? json.services : []
          };
        }

        console.log("VF payload produits =", payload);

        const list = Array.isArray(payload) ? payload : (payload.products || []);
        console.log("VF list produits =", list);

        ALL_PRODUCTS = list
          .filter(function (p) { return String(p.id || p.ID || "").trim() !== ""; })
          .map(function (p) {
            return { ...p, __vf_id: String(p.id || p.ID).trim() };
          });

        _isFirstLoad = false;
        const errBox = document.getElementById("loadError");
        if (errBox) errBox.classList.add("hidden");

        render();
      } catch (err) {
        console.error("Load Error:", err);
        if (_isFirstLoad) {
          const errBox = document.getElementById("loadError");
          if (errBox) {
            errBox.textContent = "Problème de connexion aux services. Veuillez rafraîchir.";
            errBox.classList.remove("hidden");
          }
        }
      }
    }

    // FONCTION DE SÉCURITÉ : Forcer la mémoire avant de changer de page
    window.saveProductClick = function(id) {
      try {
        sessionStorage.setItem("vf_service_id", id);
        sessionStorage.removeItem("active_order_id");
      } catch(e) {}
    };

    function render() {
      const grid = document.getElementById("product-grid");
      const input = document.getElementById("searchInput");
      if (!grid) return;

      const query = (input?.value || "").toLowerCase().trim();

      const filtered = ALL_PRODUCTS.filter(function (p) {
        const catU = up(pCat(p));
        const nameL = pName(p).toLowerCase();
        const matchCat = CURRENT_FILTER === "all" || (FILTER_MAP[CURRENT_FILTER]?.some(function (a) { return catU.includes(up(a)); })) || catU === up(CURRENT_FILTER);
        return matchCat && (!query || nameL.includes(query));
      });

      if (filtered.length === 0 && !_isFirstLoad) {
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-300 font-bold uppercase tracking-widest">Aucun produit trouvé</div>';
        return;
      }

      if (_isFirstLoad) return;

      grid.innerHTML = filtered.map(function (p) {
        const img = pImg(p) || FALLBACK_IMG;
        const priceNum = parseFloat(String(pPrice(p)).replace(",", "."));
        const priceTxt = isNaN(priceNum) ? "0.00" : priceNum.toFixed(2);
        const stableId = pStableId(p);

        if (!stableId) return "";

        const pid = encodeURIComponent(stableId);
        const targetUrl = `/p/${pid}/`;

        return `
          <a href="${targetUrl}" onclick="window.saveProductClick('${escAttr(stableId)}')" class="hover-card group bg-white rounded-[30px] p-4 border border-gray-50 flex flex-col shadow-sm">
            <div class="aspect-square bg-[#F8FAFC] rounded-[22px] mb-4 flex items-center justify-center p-6 overflow-hidden">
              <img
                src="${escAttr(img)}"
                class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500"
                onerror="this.src='${FALLBACK_IMG}'"
                alt="${escHtml(pName(p))}"
              >
            </div>

            <div class="px-1">
              <span class="text-[9px] font-black text-[#F07E13] uppercase tracking-tighter mb-1 block">
                ${escHtml(pCat(p))}
              </span>

              <h3 class="text-[13px] font-bold text-gray-900 leading-tight mb-4 h-8 overflow-hidden line-clamp-2">
                ${escHtml(pName(p))}
              </h3>

              <div class="flex items-center justify-between gap-2">
                <span class="text-gray-900 font-black text-lg tracking-tighter">${priceTxt} $</span>
                <div class="bg-gray-900 text-white p-1.5 rounded-lg group-hover:brand-gradient transition-all">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 4v16m8-8H4"></path>
                  </svg>
                </div>
              </div>
            </div>
          </a>
        `;
      }).join("");
    }

    function filterCat(cat, btn) {
      document.querySelectorAll(".cat-btn").forEach(function (b) {
        b.classList.remove("text-white", "brand-gradient", "active");
        b.classList.add("bg-white", "text-gray-500");
      });
      btn.classList.add("text-white", "brand-gradient", "active");
      CURRENT_FILTER = cat;
      render();
    }

    function renderAccountUI_() {
      const area = document.getElementById("accountArea");
      const sideArea = document.getElementById("sideAccountArea");
      const s = getSession_();
      const token = getToken_();

      const modeEl = document.getElementById("priceMode");
      if (modeEl) modeEl.textContent = token ? "Mode: REVENDEUR" : "Mode: CLIENT";

      if (area) {
        area.innerHTML = "";
        area.classList.remove("hidden");
        if (!s) {
          area.innerHTML = `<a href="/login.html" class="btn-auth btn-auth-outline">Connexion</a>`;
        } else {
          area.innerHTML = `<div class="text-[11px] font-black text-gray-900 mr-2">${escHtml(s.username || s.email)}</div>`;
        }
      }

      if (sideArea) {
        if (!s) {
          sideArea.innerHTML = `<a href="/login.html" class="btn brand-gradient w-full text-white">Connexion / Inscription</a>`;
        } else {
          sideArea.innerHTML = `
            <div class="text-sm font-bold text-gray-900 mb-4 truncate">
              Connecté en tant que<br><span class="text-[#F07E13]">${escHtml(s.email)}</span>
            </div>
            <button onclick="localStorage.clear();location.reload();" class="btn btn-outline w-full bg-white">Se déconnecter</button>
          `;
        }
      }
    }

    async function start_() {
      bindSearchInput_();
      renderAccountUI_();
      await loadProducts_(getToken_());
    }

    window.addEventListener("load", start_);
  </script>
</body>
</html>
