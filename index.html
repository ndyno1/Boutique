<!DOCTYPE html>
<html lang="fr" class="font-inter">
<head>
  <style>
    /* Supprime TOUT le CSS lié au menu (#sideMenu, .menu-link, etc.) */
    /* Ne garde QUE le CSS spécifique à la page (body, .brand-gradient, .btn, etc.) */
    
    html, body { width:100%; max-width:100%; overflow-x:hidden; }
    body{ font-family:'Inter',sans-serif; scroll-behavior:smooth; min-height:100svh; background:#F8FAFC; }
    /* ... tes autres styles (boutons, squelettes, grid, etc.) ... */
  </style>
</head>

<body>
  <div class="bg-gray-900 text-white py-2 text-[10px] font-bold uppercase tracking-[0.2em] text-center">
    MARKETPLACE PROFESSIONNELLE • LIVRAISON INTERNATIONALE • PAIEMENT SÉCURISÉ
  </div>

  <script src="/vf_menu.js"></script>

  <main class="max-w-[1280px] mx-auto px-4 py-8">
    </main>

  <footer class="bg-white border-t border-gray-100 py-12">
    </footer>

  <script>
    // ✅ NETTOYAGE IMPORTANT ICI !
    // Tu peux SUPPRIMER les fonctions suivantes car elles sont maintenant dans vf_menu.js :
    // - openMenu()
    // - closeMenu()
    // - toggleMenu()
    // - setActiveMenuLink()
    // - document.addEventListener("keydown"...)
    // - initSearchPlaceholder()

    // GARDE uniquement ta logique métier pour les produits et la session :
    const FALLBACK_IMG = "https://cdn-icons-png.flaticon.com/512/11520/11520110.png";
    let ALL_PRODUCTS = [];
    let CURRENT_FILTER = "all";
    let _isFirstLoad = true;
    const FILTER_MAP = { /* ... */ };

    // [Garde loadProducts_, render(), filterCat(), renderAccountUI_() etc...]

    async function start_(){
      // setActiveMenuLink() se lance tout seul depuis le nouveau fichier maintenant !
      renderAccountUI_();
      await loadProducts_(getToken_());
    }

    // N'oublie pas de laisser le input de recherche s'actualiser avec "render" si c'est la page boutique
    const input = document.getElementById("searchInput");
    if (input) {
      input.addEventListener("input", () => { render(); });
    }

    window.addEventListener("load", start_);
  </script>
</body>
</html>
