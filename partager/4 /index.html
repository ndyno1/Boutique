  <script>
    (function () {
      var PRODUCT_ID = "1234";
      var target = "/paiement.html?id=" + encodeURIComponent(PRODUCT_ID);

      try {
        window.location.replace(target);
      } catch (e) {
        window.location.href = target;
      }
    })();

  <meta http-equiv="refresh" content="0;url=/paiement.html?id=1234" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f3f3f3;
      color: #111827;
    }

    * {
      box-sizing: border-box;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,.06);
      text-align: center;
    }

    .brand {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #111827;
      margin-bottom: 12px;
    }

    .brand span {
      color: #F07E13;
    }

    .label {
      font-weight: 900;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #9ca3af;
    }

    .text {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      line-height: 1.5;
    }

    .link {
      display: inline-block;
      margin-top: 14px;
      color: #F07E13;
      font-weight: 900;
      text-decoration: none;
      word-break: break-all;
    }

    .link:hover {
      text-decoration: underline;
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #9ca3af;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">Viral<span>Flowr</span></div>
      <div class="label">Redirection produit</div>

      <div class="text">
        Redirection vers la page de paiement sécurisée du produit.
      </div>

      <a class="link" href="/paiement.html?id=1234">
        Ouvrir le produit : /paiement.html?id=1234
      </a>

      <noscript>
        <div class="note">
          JavaScript est désactivé. Utilisez le lien ci-dessus.
        </div>
      </noscript>
    </div>
  </div>
</body>
</html>
